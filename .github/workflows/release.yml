name: Release

on:
  push:
    tags:
      - 'v*'
      - '[0-9]*'

permissions:
  contents: write
  packages: write

jobs:
  container:
    name: Publish GHCR image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/mirrox-dev/mirrox
          tags: |
            type=raw,value=latest
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  binaries:
    name: Build native binaries
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Linux cross linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Configure Linux cross linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: echo 'CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc' >> "$GITHUB_ENV"

      - name: Build binary
        run: cargo build --release --locked --target ${{ matrix.target }} --bin mirrox

      - name: Package Unix binary
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/mirrox dist/mirrox
          tar -C dist -czf mirrox-${{ matrix.target }}.tar.gz mirrox

      - name: Package Windows binary
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target/${{ matrix.target }}/release/mirrox.exe dist/mirrox.exe
          Compress-Archive -Path dist/mirrox.exe -DestinationPath mirrox-${{ matrix.target }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mirrox-${{ matrix.target }}
          path: mirrox-${{ matrix.target }}.${{ matrix.archive }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - container
      - binaries
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release notes file
        env:
          IMAGE: ghcr.io/mirrox-dev/mirrox
          VERSION: ${{ github.ref_name }}
        run: |
          cat > release-notes.md <<'NOTES'
          ## Images

          ```bash
          docker pull ${IMAGE}:latest
          docker pull ${IMAGE}:${VERSION}
          ```

          The GHCR image supports `linux/amd64` and `linux/arm64`.

          ## Native binaries

          This release includes Linux, Windows, and macOS binaries for the supported targets attached below.
          NOTES
          sed -i "s|\${IMAGE}|$IMAGE|g; s|\${VERSION}|$VERSION|g" release-notes.md

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: mirrox ${{ github.ref_name }}
          body_path: release-notes.md
          generate_release_notes: true
          files: artifacts/*
